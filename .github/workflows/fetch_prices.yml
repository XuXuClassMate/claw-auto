name: Crypto Price Fetcher

on:
  schedule:
    - cron: '0,15,30,45 * * * *'
  workflow_dispatch:

jobs:
  fetch-crypto-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install yfinance -q
      
      - name: Fetch all crypto + stock data
        run: |
          python3 << 'PYTHON_EOF'
          import urllib.request
          import json
          import time
          import ssl
          from datetime import datetime, timezone

          # ========== CRYPTO ==========
          COINS = [
              {"id": "bitcoin",      "symbol": "BTC",  "name": "Bitcoin"},
              {"id": "ethereum",     "symbol": "ETH",  "name": "Ethereum"},
              {"id": "binancecoin",  "symbol": "BNB",  "name": "BNB"},
              {"id": "solana",       "symbol": "SOL",  "name": "Solana"},
              {"id": "ripple",       "symbol": "XRP",  "name": "XRP"},
              {"id": "cardano",      "symbol": "ADA",  "name": "Cardano"},
              {"id": "dogecoin",     "symbol": "DOGE","name": "Dogecoin"},
              {"id": "polkadot",     "symbol": "DOT",  "name": "Polkadot"},
              {"id": "avalanche-2",  "symbol": "AVAX","name": "Avalanche"},
              {"id": "chainlink",    "symbol": "LINK","name": "Chainlink"},
              {"id": "tron",         "symbol": "TRX",  "name": "Tron"},
              {"id": "polygon",       "symbol": "MATIC","name": "Polygon"},
              {"id": "shiba-inu",    "symbol": "SHIB","name": "Shiba Inu"},
              {"id": "litecoin",     "symbol": "LTC",  "name": "Litecoin"},
              {"id": "uniswap",      "symbol": "UNI",  "name": "Uniswap"},
          ]

          ctx = ssl.create_default_context()
          ctx.check_hostname = False
          ctx.verify_mode = ssl.CERT_NONE

          # --- 1. 当前价格 ---
          SYMBOLS = ",".join([c["symbol"] for c in COINS])
          price_url = ("https://min-api.cryptocompare.com/data/pricemultifull"
                       "?fsyms=" + SYMBOLS + "&tsyms=USD")
          req = urllib.request.Request(price_url, headers={"User-Agent": "MarketReporter/2.0"})
          with urllib.request.urlopen(req, timeout=15, context=ctx) as resp:
              price_data = json.loads(resp.read().decode())

          sym_map = {c["symbol"]: c for c in COINS}
          crypto_cache = {
              "last_update": datetime.now(timezone.utc).isoformat(),
              "source": "CryptoCompare",
              "data": [],
          }
          for symbol, raw in price_data.get("RAW", {}).items():
              u = raw.get("USD", {})
              price = u.get("PRICE", 0)
              open24 = u.get("OPEN24HOUR", price)
              change_24h = ((price - open24) / open24 * 100) if open24 else 0
              crypto_cache["data"].append({
                  "id": sym_map.get(symbol, {}).get("id", symbol.lower()),
                  "symbol": symbol,
                  "name": sym_map.get(symbol, {}).get("name", symbol),
                  "current_price": price,
                  "price_change_percentage_24h": round(change_24h, 2),
                  "market_cap": u.get("MKTCAP", 0),
                  "high_24h": u.get("HIGH24HOUR", price * 1.02),
                  "low_24h":  u.get("LOW24HOUR",  price * 0.98),
              })
              time.sleep(0.2)

          with open("crypto_prices.json", "w", encoding="utf-8") as f:
              json.dump(crypto_cache, f, indent=2, ensure_ascii=False)

          print("✅ 加密货币价格: {} 种".format(len(crypto_cache["data"])))
          for c in crypto_cache["data"][:5]:
              print("  {}: ${:,.2f} ({:+.2f}%)".format(
                  c["symbol"], c["current_price"], c["price_change_percentage_24h"]))

          # --- 2. 历史数据 (技术分析用) ---
          hist_cache = {
              "last_update": datetime.now(timezone.utc).isoformat(),
              "data": {}
          }
          for coin in COINS[:5]:  # 只抓前5热门币
              sym = coin["symbol"]
              hist_url = ("https://min-api.cryptocompare.com/data/v2/histoday"
                          "?fsym=" + sym + "&tsym=USD&limit=60")
              try:
                  req3 = urllib.request.Request(hist_url, headers={"User-Agent": "MarketReporter/2.0"})
                  with urllib.request.urlopen(req3, timeout=15, context=ctx) as resp3:
                      hd = json.loads(resp3.read().decode())
                  prices = [p["close"] for p in hd.get("Data", {}).get("Data", [])]
                  if prices:
                      hist_cache["data"][sym] = prices
                      print("  📈 {} 历史: {}天".format(sym, len(prices)))
              except Exception as e:
                  print("  ⚠️ {} 历史失败: {}".format(sym, e))
              time.sleep(0.3)

          with open("crypto_history.json", "w", encoding="utf-8") as f:
              json.dump(hist_cache, f, indent=2, ensure_ascii=False)

          # ========== STOCKS ==========
          print("\n📈 股票数据获取...")
          try:
              import yfinance as yf
          except ImportError:
              print("⚠️ yfinance 未安装")
              with open("stock_prices.json", "w") as f:
                  json.dump({"error": "yfinance not installed"}, f)
              exit(0)

          STOCKS = [
              {"symbol": "SPY",   "name": "SPDR S&P 500 ETF"},
              {"symbol": "QQQ",   "name": "Invesco QQQ Trust"},
              {"symbol": "DIA",   "name": "SPDR Dow Jones ETF"},
              {"symbol": "IWM",   "name": "iShares Russell 2000 ETF"},
              {"symbol": "AAPL",  "name": "Apple Inc."},
              {"symbol": "MSFT",  "name": "Microsoft Corp"},
              {"symbol": "GOOGL", "name": "Alphabet Inc."},
              {"symbol": "AMZN",  "name": "Amazon.com Inc."},
              {"symbol": "NVDA",  "name": "NVIDIA Corp"},
              {"symbol": "META",  "name": "Meta Platforms"},
              {"symbol": "TSLA",  "name": "Tesla Inc."},
              {"symbol": "BRK-B", "name": "Berkshire Hathaway"},
              {"symbol": "JPM",   "name": "JPMorgan Chase"},
              {"symbol": "V",     "name": "Visa Inc."},
              {"symbol": "UNH",   "name": "UnitedHealth Group"},
          ]

          stock_cache = {
              "last_update": datetime.now(timezone.utc).isoformat(),
              "source": "Yahoo Finance",
              "data": [],
          }
          for stock in STOCKS:
              try:
                  info = yf.Ticker(stock["symbol"]).info
                  price = info.get("currentPrice") or info.get("regularMarketPrice")
                  prev = info.get("previousClose") or info.get("regularPreviousClose")
                  if price and prev:
                      change = (price - prev) / prev * 100
                      stock_cache["data"].append({
                          "symbol": stock["symbol"],
                          "name": stock["name"],
                          "current_price": price,
                          "price_change_percentage_24h": round(change, 2),
                          "market_cap": info.get("marketCap", 0),
                          "volume": info.get("regularMarketVolume", 0),
                      })
                      print("  {}: ${:.2f} ({:+.2f}%)".format(
                          stock["symbol"], price, change))
              except Exception as e:
                  print("  ⚠️ {} 失败: {}".format(stock["symbol"], e))
              time.sleep(0.2)

          with open("stock_prices.json", "w", encoding="utf-8") as f:
              json.dump(stock_cache, f, indent=2, ensure_ascii=False)

          # --- 股票历史 (前5只) ---
          hist_stocks = {"last_update": datetime.now(timezone.utc).isoformat(), "data": {}}
          for stock in STOCKS[:5]:
              sym = stock["symbol"]
              try:
                  h = yf.Ticker(sym).history(period="60d")["Close"].tolist()
                  if h:
                      hist_stocks["data"][sym] = h
                      print("  📈 {} 股票历史: {}天".format(sym, len(h)))
              except Exception as e:
                  print("  ⚠️ {} 历史失败: {}".format(sym, e))
              time.sleep(0.3)

          with open("stock_history.json", "w", encoding="utf-8") as f:
              json.dump(hist_stocks, f, indent=2, ensure_ascii=False)

          print("\n✅ 全部完成!")
          print("  加密货币: {}种, 历史: {}币".format(len(crypto_cache["data"]), len(hist_cache["data"])))
          print("  股票: {}只, 历史: {}只".format(len(stock_cache["data"]), len(hist_stocks["data"])))

          PYTHON_EOF

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add crypto_prices.json crypto_history.json stock_prices.json stock_history.json
          if ! git diff --staged --quiet; then
            git commit -m "📊 更新市场数据 $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "✅ 数据已更新并提交"
          else
            echo "ℹ️ 数据无变化，未提交"
          fi
